plugins {
    id 'com.android.application'
}
android {
    namespace 'com.timothee.reveilflash'
    compileSdk 34
    defaultConfig {
        applicationId "com.timothee.reveilflash"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }
    buildTypes {
        debug { minifyEnabled false }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }
}
